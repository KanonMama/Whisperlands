<div class="whisperlands-settings">
    <div class="inline-drawer">
        <div class="inline-drawer-toggle inline-drawer-header">
            <b>Whisperlands</b>
            <div class="inline-drawer-icon fa-solid fa-circle-chevron-down down"></div>
        </div>
        <div class="inline-drawer-content">
            <div class="setting-row">
                <label>Extension is active. State is tracked automatically.</label>
            </div>
            <hr style="margin: 5px 0;">
            <div class="setting-row">
                <label>Current State:</label>
                <div id="wl_state_display" style="font-size:11px;color:#8898bb;white-space:pre-wrap;max-height:300px;overflow-y:auto;background:rgba(0,0,0,0.3);padding:8px;border-radius:6px;margin-top:4px;">
                    No state loaded.
                </div>
            </div>
            <hr style="margin: 5px 0;">
            <div class="setting-row">
                <div id="wl_reset_state" class="menu_button menu_button_icon interactable" title="Reset State" tabindex="0" role="button">
                    <i class="fa-solid fa-arrow-rotate-left"></i>
                    <span>Reset State</span>
                </div>
            </div>
        </div>
    </div>
</div>
